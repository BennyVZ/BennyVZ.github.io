<!doctype html>
<html lang="en">
<head>
  <title>Trail Rider</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #1b3a1b 0%, #2d5a1b 40%, #4a7c2f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 60px;
      min-height: 100vh;
    }

    h1 { font-size: 1.8rem; color: #e8f5c8; margin-bottom: 8px; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }

    .trail-label {
      font-size: 0.75rem;
      color: #a8c870;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .card {
      background: rgba(255,255,255,0.92);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }

    .big-emoji {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 8px;
      display: inline-block;
      transition: transform 0.2s;
    }
    .big-emoji.bounce { animation: bounce 0.45s ease; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      40%     { transform: translateY(-14px); }
    }

    .speech {
      font-size: 0.88rem;
      color: #777;
      min-height: 1.4em;
      margin-bottom: 20px;
    }

    .bar-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
      text-align: left;
      margin-bottom: 6px;
    }
    .bar-track {
      background: #e8edf2;
      border-radius: 10px;
      height: 18px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s, background-color 0.5s;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: white;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.95); }
  .wc-nav { position: fixed; top: 12px; left: 12px; display: flex; gap: 8px; z-index: 1000; }
  .wc-nav a { background: rgba(0,0,0,0.65); color: white; text-decoration: none; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-family: Arial, sans-serif; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.15); }
  .wc-nav a:hover { background: rgba(0,0,0,0.9); }
</style>
</head>
<body>

<nav class="wc-nav">
  <a href="/">&#127968; Home</a>
  <a href="/web-craft/">&#8592; Examples</a>
</nav>

<h1>🚵 Trail Rider</h1>
<div class="trail-label">Keep the rider going!</div>

<!-- Rider card -->
<div class="card">
  <div class="big-emoji" id="rider-emoji">🚴</div>
  <div class="speech" id="rider-speech">Crushing it! 💪</div>
  <div class="bar-label">Stamina</div>
  <div class="bar-track">
    <div class="bar-fill" id="stamina-bar"></div>
  </div>
  <button onclick="eatSnack()" style="background: #e67e22;">Eat Snack 🍌</button>
</div>

<!-- Bike card -->
<div class="card">
  <div class="big-emoji" id="bike-emoji">🚵</div>
  <div class="speech" id="bike-speech">Bike feels great! ✨</div>
  <div class="bar-label">Bike Condition</div>
  <div class="bar-track">
    <div class="bar-fill" id="condition-bar"></div>
  </div>
  <button onclick="fixBike()" style="background: #27ae60;">Fix Bike 🔧</button>
</div>

<script>
  let stamina   = 80;
  let condition = 80;

  function render() {
    // --- Stamina bar ---
    const sBar = document.getElementById('stamina-bar');
    sBar.style.width = stamina + '%';
    sBar.style.backgroundColor = stamina > 50 ? '#e67e22' : stamina > 25 ? '#e74c3c' : '#c0392b';

    const riderEmoji  = document.getElementById('rider-emoji');
    const riderSpeech = document.getElementById('rider-speech');
    if (stamina > 70) {
      riderEmoji.textContent  = '🚴';
      riderSpeech.textContent = 'Crushing it! 💪';
    } else if (stamina > 40) {
      riderEmoji.textContent  = '😮';
      riderSpeech.textContent = 'Getting tired… need a snack!';
    } else if (stamina > 0) {
      riderEmoji.textContent  = '🥵';
      riderSpeech.textContent = 'Running on empty! Feed me! 🍌';
    } else {
      riderEmoji.textContent  = '😵';
      riderSpeech.textContent = 'Totally out of energy… 😵';
    }

    // --- Condition bar ---
    const cBar = document.getElementById('condition-bar');
    cBar.style.width = condition + '%';
    cBar.style.backgroundColor = condition > 50 ? '#27ae60' : condition > 25 ? '#f39c12' : '#e74c3c';

    const bikeEmoji  = document.getElementById('bike-emoji');
    const bikeSpeech = document.getElementById('bike-speech');
    if (condition > 70) {
      bikeEmoji.textContent  = '🚵';
      bikeSpeech.textContent = 'Bike feels great! ✨';
    } else if (condition > 40) {
      bikeEmoji.textContent  = '😬';
      bikeSpeech.textContent = 'Chain is rattling… fix it soon!';
    } else if (condition > 0) {
      bikeEmoji.textContent  = '🫨';
      bikeSpeech.textContent = 'Flat tire incoming! 🔧';
    } else {
      bikeEmoji.textContent  = '💀';
      bikeSpeech.textContent = 'Bike is totally wrecked… 😭';
    }
  }

  function eatSnack() {
    stamina = Math.min(100, stamina + 30);
    bounce('rider-emoji');
    render();
  }

  function fixBike() {
    condition = Math.min(100, condition + 30);
    bounce('bike-emoji');
    render();
  }

  function bounce(id) {
    const el = document.getElementById(id);
    el.classList.remove('bounce');
    void el.offsetWidth;
    el.classList.add('bounce');
  }

  // Stamina drains slower, condition drains faster (rough trail!)
  setInterval(function() {
    stamina   = Math.max(0, stamina   - 0.8);
    condition = Math.max(0, condition - 1.2);
    render();
  }, 200);

  render();
</script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <title>Todo List</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #74b9ff, #0984e3);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      font-family: Arial, sans-serif;
    }

    .app {
      background: white;
      border-radius: 20px;
      width: min(480px, 100%);
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    /* Header */
    .app-header {
      background: #0984e3;
      padding: 24px;
      color: white;
    }
    .app-header h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .app-header p  { opacity: 0.8; font-size: 0.9rem; }
    #count-label   { font-weight: bold; }

    /* Input row */
    .input-row {
      display: flex;
      padding: 20px 20px 0;
      gap: 10px;
    }

    #new-task {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #dfe6e9;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #new-task:focus { border-color: #0984e3; }

    #btn-add {
      background: #0984e3;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-add:hover { background: #0773c5; }

    /* Filter tabs */
    .filters {
      display: flex;
      padding: 16px 20px 0;
      gap: 8px;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid #dfe6e9;
      color: #636e72;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: #0984e3;
      border-color: #0984e3;
      color: white;
    }

    /* Task list */
    #task-list {
      padding: 16px 20px;
      min-height: 200px;
      list-style: none;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f4f8;
      animation: slide-in 0.2s ease;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .task-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #0984e3;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3436;
      transition: color 0.15s;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: #b2bec3;
    }

    .btn-delete {
      background: transparent;
      border: none;
      color: #b2bec3;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .btn-delete:hover { color: #d63031; background: #fff0f0; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #b2bec3;
      font-size: 0.95rem;
    }
    .empty .emoji { font-size: 3rem; display: block; margin-bottom: 12px; }

    /* Footer */
    .app-footer {
      padding: 12px 20px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .app-footer span { font-size: 0.8rem; color: #b2bec3; }
    #btn-clear-done {
      background: transparent;
      border: none;
      color: #b2bec3;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #btn-clear-done:hover { color: #d63031; }
  .wc-nav { position: fixed; top: 12px; left: 12px; display: flex; gap: 8px; z-index: 1000; }
  .wc-nav a { background: rgba(0,0,0,0.65); color: white; text-decoration: none; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-family: Arial, sans-serif; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.15); }
  .wc-nav a:hover { background: rgba(0,0,0,0.9); }
</style>
</head>
<body>
<nav class="wc-nav">
  <a href="/">&#127968; Home</a>
  <a href="/web-craft/">&#8592; Examples</a>
</nav>

<div class="app">
  <div class="app-header">
    <h1>My Todo List</h1>
    <p>You have <span id="count-label">0</span> tasks left</p>
  </div>

  <div class="input-row">
    <input type="text" id="new-task" placeholder="Add a new task…" autocomplete="off">
    <button id="btn-add">+</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
  </div>

  <ul id="task-list"></ul>

  <div class="app-footer">
    <span id="storage-note">Saved to localStorage</span>
    <button id="btn-clear-done">Clear completed</button>
  </div>
</div>

<script>
  // ---- State ----
  // Load tasks from localStorage, or start with a few examples
  let tasks = JSON.parse(localStorage.getItem('wc-todos') || 'null') || [
    { id: 1, text: 'Learn HTML', done: true  },
    { id: 2, text: 'Learn CSS',  done: true  },
    { id: 3, text: 'Learn JavaScript', done: false },
    { id: 4, text: 'Build something cool!', done: false },
  ];
  let nextId  = Math.max(0, ...tasks.map(t => t.id)) + 1;
  let filter  = 'all';

  // ---- Save to localStorage ----
  function save() {
    localStorage.setItem('wc-todos', JSON.stringify(tasks));
  }

  // ---- Re-render the list ----
  function render() {
    const list = document.getElementById('task-list');
    list.innerHTML = '';

    const visible = tasks.filter(function(t) {
      if (filter === 'active') return !t.done;
      if (filter === 'done')   return  t.done;
      return true;
    });

    if (visible.length === 0) {
      list.innerHTML = '<li class="empty"><span class="emoji">🎉</span>Nothing here!</li>';
    } else {
      visible.forEach(function(task) {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.done ? ' done' : '');
        li.innerHTML =
          '<input type="checkbox"' + (task.done ? ' checked' : '') + '>' +
          '<span class="task-text">' + escapeHtml(task.text) + '</span>' +
          '<button class="btn-delete" title="Delete">✕</button>';

        // Toggle done
        li.querySelector('input').addEventListener('change', function() {
          task.done = this.checked;
          save();
          render();
        });

        // Delete
        li.querySelector('.btn-delete').addEventListener('click', function() {
          tasks = tasks.filter(t => t.id !== task.id);
          save();
          render();
        });

        list.appendChild(li);
      });
    }

    // Update counter (only active tasks)
    const activeCount = tasks.filter(t => !t.done).length;
    document.getElementById('count-label').textContent = activeCount;
  }

  // ---- Add a new task ----
  function addTask() {
    const input = document.getElementById('new-task');
    const text  = input.value.trim();
    if (!text) return;

    tasks.push({ id: nextId++, text: text, done: false });
    input.value = '';
    save();
    render();
  }

  // ---- Escape HTML to prevent XSS ----
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- Event listeners ----
  document.getElementById('btn-add').addEventListener('click', addTask);

  document.getElementById('new-task').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addTask();
  });

  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  document.getElementById('btn-clear-done').addEventListener('click', function() {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  });

  render();
</script>

</body>
</html>
 body { background: blue; }
